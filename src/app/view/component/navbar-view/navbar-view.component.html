<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar-container">
    <a class="navbar-brand" href="#main">
      <span class="brand-icon">&lt;/&gt;</span>
      <span class="brand-text">Dilmer</span>
    </a>

    <div class="navbar-menu" [class.active]="isMobileMenuOpen">
      <a class="nav-link" href="#main" (click)="closeMobileMenu()">Home</a>
      <a class="nav-link" href="#about" (click)="closeMobileMenu()">About</a>
      <a class="nav-link" href="#skill" (click)="closeMobileMenu()">Skills</a>
      <a class="nav-link" href="#projects" (click)="closeMobileMenu()">Projects</a>
      <a class="nav-link" href="#contact" (click)="closeMobileMenu()">Contact</a>
      <a class="nav-link social-link" href="https://github.com/dilmer23" target="_blank">
        <i class="fa-brands fa-github"></i>
      </a>
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'">
        <i class="fa-solid" [ngClass]="{'fa-sun': isDarkTheme, 'fa-moon': !isDarkTheme}"></i>
      </button>
    </div>

    <button class="mobile-menu-btn" (click)="toggleMobileMenu()" [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'">
      <span class="hamburger" [class.active]="isMobileMenuOpen"></span>
    </button>
  </div>
</nav>
