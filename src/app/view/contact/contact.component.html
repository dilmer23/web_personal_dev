<div class="section-container">
  <h2 class="section-title fade-in">
    <i class="fa-solid fa-envelope"></i>
    <span>Contacto</span>
  </h2>

  <div class="contact-grid">
    <div class="contact-info slide-in-left">
      <p class="contact-intro">
        ¿Tienes un proyecto en mente o quieres colaborar? ¡No dudes en contactarme!
      </p>
      <div class="contact-methods">
        <a href="mailto:dilmertiguas@gmail.com" class="contact-method glass-card">
          <div class="method-icon email">
            <i class="fas fa-envelope"></i>
          </div>
          <div class="method-info">
            <span class="method-label">Email</span>
            <span class="method-value">dilmertiguas&#64;gmail.com</span>
          </div>
        </a>
        <a href="https://www.linkedin.com/in/dilmer-ramirez23" target="_blank" class="contact-method glass-card">
          <div class="method-icon linkedin">
            <i class="fa-brands fa-linkedin"></i>
          </div>
          <div class="method-info">
            <span class="method-label">LinkedIn</span>
            <span class="method-value">Dilmer Ramirez</span>
          </div>
        </a>
        <a href="https://github.com/dilmer23" target="_blank" class="contact-method glass-card">
          <div class="method-icon github">
            <i class="fa-brands fa-github"></i>
          </div>
          <div class="method-info">
            <span class="method-label">GitHub</span>
            <span class="method-value">dilmer23</span>
          </div>
        </a>
      </div>
    </div>

    <div class="contact-form-wrapper slide-in-right">
      <form class="contact-form glass-card" (ngSubmit)="onSubmit()" #contactForm="ngForm" *ngIf="!sent; else thanks">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" placeholder="Tu nombre" [(ngModel)]="form.name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" [(ngModel)]="form.email" required>
        </div>
        <div class="form-group">
          <label for="message">Mensaje</label>
          <textarea id="message" name="message" rows="4" placeholder="Escribe tu mensaje..." [(ngModel)]="form.message" required></textarea>
        </div>
        <p class="form-error" *ngIf="error">{{ error }}</p>
        <button type="submit" class="btn-modern btn-primary-modern submit-btn" [disabled]="sending">
          <i class="fas fa-paper-plane"></i> {{ sending ? 'Enviando...' : 'Enviar Mensaje' }}
        </button>
      </form>
      <ng-template #thanks>
        <div class="contact-form glass-card thank-you">
          <i class="fas fa-check-circle"></i>
          <h3>¡Mensaje enviado!</h3>
          <p>Gracias por contactarme, te responderé pronto.</p>
          <button class="btn-modern btn-outline-modern" (click)="sent = false">Enviar otro</button>
        </div>
      </ng-template>
    </div>
  </div>
</div>
